<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters — Email Confirmed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 48px 36px; width: 100%; max-width: 420px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); text-align: center; }
    .orb { width: 64px; height: 64px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px; }
    .logo-text { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 32px; }
    .check { width: 56px; height: 56px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 20px; }
    h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
    p { font-size: 14px; color: #888; line-height: 1.6; margin-bottom: 28px; }
    .btn { display: block; background: #1D9E75; color: white; padding: 12px 24px; border-radius: 9px; font-size: 14px; font-weight: 500; text-decoration: none; }
    .btn:hover { background: #0F6E56; }
  </style>
</head>
<body>
  <div class="card">
    <div class="orb">✉</div>
    <div class="logo-text">Lingua Letters</div>
    <div class="check">✓</div>
    <h1>Email confirmed!</h1>
    <p>Your account is now active. You can sign in and start connecting with pen pals around the world.</p>
    <a href="/login.html" class="btn">Sign in to Lingua Letters</a>
  </div>
</body>
</html>
