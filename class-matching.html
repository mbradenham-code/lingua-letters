<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters — Class Matching</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; min-height: 100vh; }
    .topbar { background: white; border-bottom: 1px solid #e5e3dc; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 500; color: #1a1a1a; }
    .orb { width: 26px; height: 26px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .spacer { flex: 1; }
    .back { font-size: 13px; color: #1D9E75; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .content { max-width: 860px; margin: 36px auto; padding: 0 20px; }
    .page-header { background: white; border-radius: 14px; padding: 24px 28px; margin-bottom: 20px; border: 1px solid #e5e3dc; }
    .page-header h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .page-header p { font-size: 13px; color: #888; }
    .pairing-card { background: white; border-radius: 14px; border: 1px solid #e5e3dc; margin-bottom: 16px; overflow: hidden; }
    .pairing-body { display: flex; align-items: center; gap: 0; }
    .student-side { flex: 1; padding: 20px 24px; }
    .student-side.theirs { background: #F8F7F4; }
    .side-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; margin-bottom: 10px; }
    .student-card { display: flex; align-items: center; gap: 10px; }
    .av { width: 40px; height: 40px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .av.alt { background: #0F6E56; }
    .student-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .student-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .match-icon { font-size: 22px; padding: 0 8px; flex-shrink: 0; }
    .pairing-footer { padding: 14px 24px; border-top: 1px solid #f0ede6; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .approval-status { display: flex; gap: 16px; }
    .approval-item { font-size: 12px; display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.approved { background: #1D9E75; }
    .dot.pending { background: #e5e3dc; }
    .dot.declined { background: #A32D2D; }
    .actions { display: flex; gap: 8px; }
    .btn { padding: 8px 16px; border-radius: 9px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; }
    .btn-approve { background: #1D9E75; color: white; }
    .btn-approve:hover { background: #0F6E56; }
    .btn-decline { background: #FCEBEB; color: #A32D2D; }
    .btn-decline:hover { background: #f5d5d5; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-chip { font-size: 11px; padding: 4px 12px; border-radius: 20px; }
    .chip-matched { background: #E1F5EE; color: #0F6E56; }
    .chip-pending { background: #FAEEDA; color: #854F0B; }
    .chip-declined { background: #FCEBEB; color: #A32D2D; }
    .generate-bar { background: white; border-radius: 14px; border: 1px solid #e5e3dc; padding: 20px 24px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .generate-bar p { font-size: 13px; color: #555; }
    .btn-generate { padding: 10px 20px; background: #1D9E75; color: white; border: none; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .btn-generate:hover { background: #0F6E56; }
    .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; line-height: 1.7; }
    .loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
    .msg { font-size: 12px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="orb">✉</div>Lingua Letters</div>
  <div class="spacer"></div>
  <a class="back" href="/teacher-network.html">← Network</a>
</div>

<div class="content">
  <div class="page-header">
    <h1>🤝 Class Matching</h1>
    <p id="partner-subtitle">Loading partner class…</p>
  </div>

  <div id="loading" class="loading">Loading…</div>
  <div id="main" style="display:none;">
    <div class="generate-bar">
      <p>The app will automatically suggest pairings based on learning language and age. Both teachers must approve each pairing before students become pen pals.</p>
      <button class="btn-generate" onclick="generatePairings()">Suggest pairings</button>
    </div>
    <div id="pairing-list"></div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://vfohvovtxklsdvpigycx.supabase.co',
    'sb_publishable_iOcoEodjREKpEL1B7DqRSg_k4cKFSEu'
  )

  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.href = '/login.html' }

  const { data: me } = await supabase.from('users').select('*').eq('id', session.user.id).single()
  if (!me || me.account_type !== 'teacher') { window.location.href = '/dashboard.html' }

  const params = new URLSearchParams(window.location.search)
  const partnerId = params.get('partner')

  if (!partnerId) {
    document.getElementById('loading').textContent = 'No partner specified. Go back to the teacher network.'
    return
  }

  // Load partner info
  const { data: partner } = await supabase
    .from('users')
    .select('id, display_name, full_name, school_name')
    .eq('id', partnerId)
    .single()

  if (!partner) {
    document.getElementById('loading').textContent = 'Could not find partner teacher.'
    return
  }

  document.getElementById('partner-subtitle').textContent =
    `Matching your class with ${partner.display_name || partner.full_name}'s class at ${partner.school_name || 'their school'}.`

  // Load connection
  const { data: connection } = await supabase
    .from('teacher_connections')
    .select('id, status')
    .or(`and(sender_id.eq.${me.id},receiver_id.eq.${partnerId}),and(sender_id.eq.${partnerId},receiver_id.eq.${me.id})`)
    .eq('status', 'accepted')
    .single()

  if (!connection) {
    document.getElementById('loading').textContent = 'You need to be connected with this teacher first.'
    return
  }

  // Load my students and partner students
  const { data: myStudents } = await supabase
    .from('users')
    .select('id, display_name, full_name, learning_language, age')
    .eq('account_type', 'student')
    .eq('teacher_id', me.id)

  const { data: theirStudents } = await supabase
    .from('users')
    .select('id, display_name, full_name, learning_language, age')
    .eq('account_type', 'student')
    .eq('teacher_id', partnerId)

  document.getElementById('loading').style.display = 'none'
  document.getElementById('main').style.display = 'block'

  // Load existing pairings
  await renderPairings(connection.id)

  window.generatePairings = async function() {
    const mine = myStudents || []
    const theirs = theirStudents || []

    if (mine.length === 0 || theirs.length === 0) {
      alert('Both classes need students before pairings can be suggested.')
      return
    }

    // Check existing pairings to avoid duplicates
    const { data: existing } = await supabase
      .from('student_pairings')
      .select('student_a, student_b')
      .eq('connection_id', connection.id)

    const pairedIds = new Set()
    if (existing) existing.forEach(p => { pairedIds.add(p.student_a); pairedIds.add(p.student_b) })

    const availableMine = mine.filter(s => !pairedIds.has(s.id))
    const availableTheirs = theirs.filter(s => !pairedIds.has(s.id))

    if (availableMine.length === 0 || availableTheirs.length === 0) {
      alert('All available students have already been paired.')
      return
    }

    // Match by closest age, same or compatible language
    const pairs = []
    const usedTheirs = new Set()

    for (const s of availableMine) {
      let best = null
      let bestScore = Infinity

      for (const t of availableTheirs) {
        if (usedTheirs.has(t.id)) continue
        const ageDiff = Math.abs((s.age || 14) - (t.age || 14))
        const langMatch = s.learning_language === t.learning_language ? 0 : 5
        const score = ageDiff + langMatch
        if (score < bestScore) { bestScore = score; best = t }
      }

      if (best) {
        pairs.push({ student_a: s.id, student_b: best.id, connection_id: connection.id, status: 'proposed' })
        usedTheirs.add(best.id)
      }
    }

    if (pairs.length === 0) { alert('Could not generate any new pairings.'); return }

    const { error } = await supabase.from('student_pairings').insert(pairs)
    if (error) { alert('Error saving pairings: ' + error.message); return }

    await renderPairings(connection.id)
  }

  async function renderPairings(connectionId) {
    const { data: pairings } = await supabase
      .from('student_pairings')
      .select('*, student_a_data:users!student_pairings_student_a_fkey(id, display_name, full_name, learning_language, age), student_b_data:users!student_pairings_student_b_fkey(id, display_name, full_name, learning_language, age)')
      .eq('connection_id', connectionId)
      .order('created_at')

    const list = document.getElementById('pairing-list')

    if (!pairings || pairings.length === 0) {
      list.innerHTML = '<div class="empty">No pairings yet.<br>Click "Suggest pairings" to get started.</div>'
      return
    }

    // Figure out which side I am for each pairing
    const myStudentIds = new Set((myStudents || []).map(s => s.id))

    list.innerHTML = pairings.map(p => {
      const iAmSideA = myStudentIds.has(p.student_a)
      const myStudent = iAmSideA ? p.student_a_data : p.student_b_data
      const theirStudent = iAmSideA ? p.student_b_data : p.student_a_data

      const myApproval = iAmSideA ? p.teacher_a_approved : p.teacher_b_approved
      const theirApproval = iAmSideA ? p.teacher_b_approved : p.teacher_a_approved

      const myInitials = (myStudent?.display_name || myStudent?.full_name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2)
      const theirInitials = (theirStudent?.display_name || theirStudent?.full_name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2)

      let chipClass = 'chip-pending'
      let chipLabel = 'Pending approval'
      if (p.status === 'approved') { chipClass = 'chip-matched'; chipLabel = '✓ Matched!' }
      if (p.status === 'declined') { chipClass = 'chip-declined'; chipLabel = '✕ Declined' }

      const canAct = p.status === 'proposed' && !myApproval

      return `
        <div class="pairing-card" id="pair-${p.id}">
          <div class="pairing-body">
            <div class="student-side">
              <div class="side-label">Your student</div>
              <div class="student-card">
                <div class="av">${myInitials}</div>
                <div>
                  <div class="student-name">${myStudent?.display_name || myStudent?.full_name || '—'}</div>
                  <div class="student-meta">Learning ${myStudent?.learning_language || '—'} · Age ${myStudent?.age || '—'}</div>
                </div>
              </div>
            </div>
            <div class="match-icon">🤝</div>
            <div class="student-side theirs">
              <div class="side-label">Their student</div>
              <div class="student-card">
                <div class="av alt">${theirInitials}</div>
                <div>
                  <div class="student-name">${theirStudent?.display_name || theirStudent?.full_name || '—'}</div>
                  <div class="student-meta">Learning ${theirStudent?.learning_language || '—'} · Age ${theirStudent?.age || '—'}</div>
                </div>
              </div>
            </div>
          </div>
          <div class="pairing-footer">
            <div class="approval-status">
              <div class="approval-item">
                <div class="dot ${myApproval ? 'approved' : 'pending'}"></div>
                You: ${myApproval ? 'Approved' : 'Pending'}
              </div>
              <div class="approval-item">
                <div class="dot ${theirApproval ? 'approved' : 'pending'}"></div>
                Them: ${theirApproval ? 'Approved' : 'Pending'}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="status-chip ${chipClass}">${chipLabel}</span>
              ${canAct ? `
                <div class="actions">
                  <button class="btn btn-approve" onclick="act('${p.id}', '${iAmSideA}', 'approve')">✓ Approve</button>
                  <button class="btn btn-decline" onclick="act('${p.id}', '${iAmSideA}', 'decline')">✕ Decline</button>
                </div>` : ''}
            </div>
          </div>
        </div>
      `
    }).join('')
  }

  window.act = async function(pairingId, iAmSideA, action) {
    const approvalField = iAmSideA === 'true' ? 'teacher_a_approved' : 'teacher_b_approved'
    const isApprove = action === 'approve'

    const updateData = { [approvalField]: isApprove }

    if (!isApprove) {
      updateData.status = 'declined'
    }

    const { error } = await supabase
      .from('student_pairings')
      .update(updateData)
      .eq('id', pairingId)

    if (error) { alert('Error: ' + error.message); return }

    // Check if both approved — if so, create pen pal connection and mark matched
    if (isApprove) {
      const { data: pairing } = await supabase
        .from('student_pairings')
        .select('*')
        .eq('id', pairingId)
        .single()

      if (pairing?.teacher_a_approved && pairing?.teacher_b_approved) {
        // Both approved — create pen pal connection
        await supabase.from('pen_pal_connections').insert({
          student_a: pairing.student_a,
          student_b: pairing.student_b
        })
        await supabase.from('student_pairings').update({ status: 'approved' }).eq('id', pairingId)
      }
    }

    await renderPairings(connection.id)
  }
</script>
</body>
</html>
