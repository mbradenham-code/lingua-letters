<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; min-height: 100vh; }
    .topbar { background: white; border-bottom: 1px solid #e5e3dc; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 500; color: #1a1a1a; text-decoration: none; }
    .orb { width: 26px; height: 26px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .spacer { flex: 1; }
    .signout { font-size: 12px; color: #aaa; cursor: pointer; background: none; border: none; }
    .content { max-width: 640px; margin: 32px auto; padding: 0 20px 60px; }
    .page-title { font-size: 20px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #888; margin-bottom: 28px; }
    .section { background: white; border: 1px solid #e5e3dc; border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
    .section-header { padding: 14px 18px; border-bottom: 1px solid #e5e3dc; background: #F8F7F4; }
    .section-title { font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .section-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
    .setting-row { display: flex; align-items: flex-start; gap: 14px; padding: 13px 18px; border-bottom: 1px solid #e5e3dc; }
    .setting-row:last-child { border-bottom: none; }
    .sr-info { flex: 1; }
    .sr-label { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
    .sr-sub { font-size: 11px; color: #aaa; line-height: 1.5; }
    .tog { position: relative; width: 36px; height: 20px; flex-shrink: 0; margin-top: 1px; }
    .tog input { opacity: 0; width: 0; height: 0; position: absolute; }
    .tsl { position: absolute; inset: 0; background: #ccc; border-radius: 20px; cursor: pointer; transition: background .18s; }
    .tsl::before { content: ""; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px; background: white; border-radius: 50%; transition: transform .18s; }
    .tog input:checked + .tsl { background: #1D9E75; }
    .tog input:checked + .tsl::before { transform: translateX(16px); }
    .tog input:disabled + .tsl { opacity: .4; cursor: default; }
    select, input[type=text] { font-size: 12px; padding: 6px 10px; border: 1px solid #e5e3dc; border-radius: 8px; background: white; color: #1a1a1a; outline: none; }
    select:focus, input:focus { border-color: #1D9E75; }
    .lang-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 13px 18px; }
    .lang-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #e5e3dc; color: #555; background: white; }
    .lang-chip.on { background: #E1F5EE; color: #0F6E56; border-color: #9FE1CB; font-weight: 500; }
    .profile-field { padding: 11px 18px; border-bottom: 1px solid #e5e3dc; display: flex; align-items: center; gap: 12px; }
    .profile-field:last-child { border-bottom: none; }
    .pf-label { font-size: 12px; color: #aaa; width: 120px; flex-shrink: 0; }
    .pf-value { font-size: 13px; color: #1a1a1a; flex: 1; }
    .pf-edit { font-size: 11px; color: #0F6E56; cursor: pointer; background: none; border: none; }
    .pf-input { font-size: 13px; padding: 5px 9px; border: 1px solid #e5e3dc; border-radius: 7px; outline: none; flex: 1; font-family: inherit; }
    .pf-input:focus { border-color: #1D9E75; }
    .save-btn { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 8px 18px; font-size: 12px; font-weight: 500; cursor: pointer; margin: 14px 18px; }
    .save-btn:hover { background: #0F6E56; }
    .danger-btn { background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; border-radius: 8px; padding: 8px 18px; font-size: 12px; cursor: pointer; margin: 14px 18px; }
    .chip { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; padding: 2px 8px; border-radius: 20px; }
    .cg { background: #E1F5EE; color: #0F6E56; }
    .cb { background: #E6F1FB; color: #0C447C; }
    .cp { background: #EEEDFE; color: #3C3489; }
    .ca { background: #FAEEDA; color: #854F0B; }
    .ibox { border-left: 3px solid; padding: 9px 12px; font-size: 11px; line-height: 1.6; border-radius: 0 8px 8px 0; margin: 0 18px 14px; }
    .ib-blue { background: #E6F1FB; border-color: #378ADD; color: #0C447C; }
    .ib-amber { background: #FAEEDA; border-color: #EF9F27; color: #633806; }
    .flag-bar { display: flex; gap: 4px; align-items: center; }
    .flag-dot { width: 10px; height: 10px; border-radius: 50%; }
    .loading { text-align: center; padding: 60px 20px; color: #aaa; }
    .connect-row { padding: 13px 18px; border-bottom: 1px solid #e5e3dc; display: flex; align-items: center; gap: 12px; }
    .connect-row:last-child { border-bottom: none; }
    .code-box { font-size: 18px; font-weight: 500; color: #1D9E75; letter-spacing: 2px; background: #E1F5EE; border-radius: 8px; padding: 8px 14px; }
    .copy-btn { font-size: 11px; color: #0F6E56; background: none; border: 1px solid #9FE1CB; border-radius: 7px; padding: 4px 10px; cursor: pointer; }
  </style>
</head>
<body>
<div class="topbar">
  <a class="logo" href="/dashboard.html"><div class="orb">✉</div>Lingua Letters</a>
  <div class="spacer"></div>
  <span style="font-size:13px;color:#555;" id="user-name"></span>
  <button class="signout" onclick="handleSignOut()">Sign out</button>
</div>

<div class="content" id="content">
  <div class="loading">Loading settings...</div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://vfohvovtxklsdvpigycx.supabase.co',
    'sb_publishable_iOcoEodjREKpEL1B7DqRSg_k4cKFSEu'
  )

  let currentUser = null
  let editingField = null
  const LANGS = ['Spanish','French','Italian','Korean','Japanese','German','Portuguese','Mandarin']

  async function init() {
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = '/login.html'; return }

    const { data: user } = await supabase
      .from('users').select('*').eq('id', session.user.id).single()

    if (!user) { window.location.href = '/login.html'; return }
    currentUser = user
    document.getElementById('user-name').textContent = user.display_name
    renderSettings()
  }

  function renderSettings() {
    const u = currentUser
    const isStudent = u.account_type === 'student'
    const isSchool = u.account_subtype === 'student_school'
    const isHome = u.account_subtype === 'student_home'
    const isSolo = u.account_type === 'solo'
    const isTeacher = u.account_type === 'teacher'
    const isParent = u.account_type === 'parent'
    const flagCount = u.flag_count || 0
    const flagColor = flagCount >= 4 ? '#A32D2D' : flagCount >= 2 ? '#854F0B' : '#0F6E56'

    document.getElementById('content').innerHTML = `
      <div class="page-title">⚙ Settings</div>
      <div class="page-sub">Manage your account, display preferences, and learning languages.</div>

      <!-- PROFILE -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">My profile</div>
          <div class="section-sub">Your account information</div>
        </div>
        <div class="profile-field">
          <div class="pf-label">Display name</div>
          <div class="pf-value" id="val-display">${u.display_name}</div>
          <button class="pf-edit" onclick="editField('display')">Edit</button>
        </div>
        <div class="profile-field">
          <div class="pf-label">Full name</div>
          <div class="pf-value">${u.full_name}</div>
        </div>
        <div class="profile-field">
          <div class="pf-label">Email</div>
          <div class="pf-value">${u.email}</div>
        </div>
        <div class="profile-field">
          <div class="pf-label">Account type</div>
          <div class="pf-value">
            ${isSchool ? '<span class="chip cb">🏫 School account</span>' :
              isHome ? '<span class="chip cp">🏠 Home account</span>' :
              isTeacher ? '<span class="chip cg">📚 Teacher</span>' :
              isParent ? '<span class="chip" style="background:#F0E6FF;color:#5B21B6;">👨‍👩‍👧 Parent</span>' :
              '<span class="chip cg">🌍 Solo learner</span>'}
          </div>
        </div>
        ${u.age ? `<div class="profile-field"><div class="pf-label">Age</div><div class="pf-value">${u.age}</div></div>` : ''}
        <div id="edit-display-form" style="display:none;padding:11px 18px;border-top:1px solid #e5e3dc;">
          <input class="pf-input" id="new-display" placeholder="New display name" value="${u.display_name}">
          <button class="save-btn" style="margin:8px 0 0;" onclick="saveDisplay()">Save</button>
          <button class="danger-btn" style="margin:8px 0 0 8px;background:none;color:#aaa;border-color:#e5e3dc;" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>

      ${(isStudent || isSolo) ? `
      <!-- DISPLAY LANGUAGE -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">Display language</div>
          <div class="section-sub">How letters appear in your inbox by default</div>
        </div>
        <div class="setting-row">
          <div class="sr-info"><div class="sr-label">Show letters in</div><div class="sr-sub">Switch between target language, English, or both at any time from inside a letter too.</div></div>
          <select id="lang-display" onchange="saveLangDisplay(this.value)">
            <option value="target">Target language</option>
            <option value="english">English</option>
            <option value="both">Both side by side</option>
          </select>
        </div>
        ${isSolo ? `
        <div class="setting-row">
          <div class="sr-info"><div class="sr-label">Challenge mode</div><div class="sr-sub">No translation hints — you read letters exactly as written. Good for advanced learners.</div></div>
          <label class="tog"><input type="checkbox" id="challenge-mode"><span class="tsl"></span></label>
        </div>
        <div class="setting-row">
          <div class="sr-info"><div class="sr-label">Immersion mode</div><div class="sr-sub">The entire app interface switches to your target language.</div></div>
          <label class="tog"><input type="checkbox" id="immersion-mode"><span class="tsl"></span></label>
        </div>` : ''}
        ${isSchool ? `
        <div class="ibox ib-blue" style="margin-top:8px;">
          🏫 Your teacher may override display settings for your class. These preferences apply outside of class mode.
        </div>` : ''}
      </div>

      <!-- LANGUAGES -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">Languages I am learning</div>
          <div class="section-sub">Tap to add or remove</div>
        </div>
        <div class="lang-chips">
          ${LANGS.map(l => `<div class="lang-chip${l === (u.learning_language||'Spanish') ? ' on' : ''}" onclick="toggleLang(this,'${l}')">${l}</div>`).join('')}
        </div>
      </div>

      <!-- PEN PAL CONNECTION -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">Add a pen pal</div>
          <div class="section-sub">Two ways to connect</div>
        </div>
        <div class="connect-row">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;margin-bottom:3px;">📱 Your connection code</div>
            <div style="font-size:11px;color:#aaa;margin-bottom:8px;">Share this in person with someone you'd like to write to.</div>
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="code-box" id="my-code">Loading...</div>
              <button class="copy-btn" onclick="copyCode()">📋 Copy</button>
            </div>
          </div>
        </div>
        <div class="connect-row">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;margin-bottom:3px;">🔗 Enter a code</div>
            <div style="font-size:11px;color:#aaa;margin-bottom:8px;">Got a code from someone? Enter it here.</div>
            <div style="display:flex;gap:8px;">
              <input type="text" id="enter-code" placeholder="LL-XXXX" style="
