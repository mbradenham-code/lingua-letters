<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; min-height: 100vh; }
    .topbar { background: white; border-bottom: 1px solid #e5e3dc; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 500; color: #1a1a1a; text-decoration: none; }
    .orb { width: 26px; height: 26px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .spacer { flex: 1; }
    .signout { font-size: 12px; color: #aaa; cursor: pointer; background: none; border: none; }
    .content { max-width: 640px; margin: 32px auto; padding: 0 20px 60px; }
    .page-title { font-size: 20px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #888; margin-bottom: 28px; }
    .section { background: white; border: 1px solid #e5e3dc; border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
    .section-header { padding: 14px 18px; border-bottom: 1px solid #e5e3dc; background: #F8F7F4; }
    .section-title { font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .section-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
    .setting-row { display: flex; align-items: flex-start; gap: 14px; padding: 13px 18px; border-bottom: 1px solid #e5e3dc; }
    .setting-row:last-child { border-bottom: none; }
    .sr-info { flex: 1; }
    .sr-label { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
    .sr-sub { font-size: 11px; color: #aaa; line-height: 1.5; }
    .tog { position: relative; width: 36px; height: 20px; flex-shrink: 0; margin-top: 1px; }
    .tog input { opacity: 0; width: 0; height: 0; position: absolute; }
    .tsl { position: absolute; inset: 0; background: #ccc; border-radius: 20px; cursor: pointer; transition: background .18s; }
    .tsl::before { content: ""; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px; background: white; border-radius: 50%; transition: transform .18s; }
    .tog input:checked + .tsl { background: #1D9E75; }
    .tog input:checked + .tsl::before { transform: translateX(16px); }
    .tog input:disabled + .tsl { opacity: .4; cursor: default; }
    select { font-size: 12px; padding: 6px 10px; border: 1px solid #e5e3dc; border-radius: 8px; background: white; color: #1a1a1a; outline: none; }
    select:focus { border-color: #1D9E75; }
    .lang-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 13px 18px; }
    .lang-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #e5e3dc; color: #555; background: white; }
    .lang-chip.on { background: #E1F5EE; color: #0F6E56; border-color: #9FE1CB; font-weight: 500; }
    .profile-field { padding: 11px 18px; border-bottom: 1px solid #e5e3dc; display: flex; align-items: center; gap: 12px; }
    .profile-field:last-child { border-bottom: none; }
    .pf-label { font-size: 12px; color: #aaa; width: 120px; flex-shrink: 0; }
    .pf-value { font-size: 13px; color: #1a1a1a; flex: 1; }
    .pf-edit { font-size: 11px; color: #0F6E56; cursor: pointer; background: none; border: none; }
    .pf-input { font-size: 13px; padding: 5px 9px; border: 1px solid #e5e3dc; border-radius: 7px; outline: none; flex: 1; font-family: inherit; width: 100%; margin-top: 6px; }
    .pf-input:focus { border-color: #1D9E75; }
    .save-btn { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 8px 18px; font-size: 12px; font-weight: 500; cursor: pointer; margin-top: 10px; }
    .save-btn:hover { background: #0F6E56; }
    .danger-btn { background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; border-radius: 8px; padding: 8px 18px; font-size: 12px; cursor: pointer; }
    .chip { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; padding: 2px 8px; border-radius: 20px; }
    .cg { background: #E1F5EE; color: #0F6E56; }
    .cb { background: #E6F1FB; color: #0C447C; }
    .cp { background: #EEEDFE; color: #3C3489; }
    .ibox { border-left: 3px solid #378ADD; padding: 9px 12px; font-size: 11px; line-height: 1.6; border-radius: 0 8px 8px 0; margin: 10px 18px; background: #E6F1FB; color: #0C447C; }
    .connect-row { padding: 13px 18px; border-bottom: 1px solid #e5e3dc; }
    .connect-row:last-child { border-bottom: none; }
    .code-box { font-size: 18px; font-weight: 500; color: #1D9E75; letter-spacing: 2px; background: #E1F5EE; border-radius: 8px; padding: 8px 14px; display: inline-block; margin: 8px 0; }
    .copy-btn { font-size: 11px; color: #0F6E56; background: none; border: 1px solid #9FE1CB; border-radius: 7px; padding: 4px 10px; cursor: pointer; margin-left: 8px; }
    /* Theme picker */
    .theme-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 16px 18px; }
    .theme-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 14px; border-radius: 12px; border: 2px solid #e5e3dc; background: white; cursor: pointer; font-family: inherit; transition: all .15s; min-width: 76px; }
    .theme-btn:hover { border-color: #1D9E75; }
    .theme-btn.selected { border-color: #1D9E75; background: #E1F5EE; }
    .theme-btn .theme-emoji { font-size: 22px; }
    .theme-btn .theme-name { font-size: 11px; font-weight: 500; color: #555; }
    .theme-btn.selected .theme-name { color: #0F6E56; font-weight: 600; }
    .theme-saved { font-size: 12px; color: #1D9E75; padding: 0 18px 14px; display: none; }
  </style>
</head>
<body>
<div class="topbar">
  <a class="logo" href="/dashboard.html"><div class="orb">✉</div>Lingua Letters</a>
  <div class="spacer"></div>
  <span style="font-size:13px;color:#555;" id="user-name"></span>
  <button class="signout" onclick="handleSignOut()">Sign out</button>
</div>

<div class="content" id="content">
  <div style="text-align:center;padding:60px 20px;color:#aaa;">Loading settings...</div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  import { loadAndApplyTheme, applyTheme, THEMES } from '/theme.js'

  const supabase = createClient(
    'https://vfohvovtxklsdvpigycx.supabase.co',
    'sb_publishable_iOcoEodjREKpEL1B7DqRSg_k4cKFSEu'
  )

  const LANGS = ['Spanish','French','Italian','Korean','Japanese','German','Portuguese','Mandarin']
  let currentUser = null
  let currentTheme = 'classic'

  async function init() {
    try {
      await loadAndApplyTheme(supabase)
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) { window.location.href = '/login.html'; return }

      const { data: user, error } = await supabase
        .from('users').select('*').eq('id', session.user.id).single()

      if (error || !user) {
        document.getElementById('content').innerHTML = `
          <div style="text-align:center;padding:60px 20px;color:#aaa;">
            <p style="font-size:14px;margin-bottom:8px;">Could not load your profile.</p>
            <button onclick="window.location.href='/dashboard.html'" style="background:#1D9E75;color:white;border:none;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;">Back to dashboard</button>
          </div>`
        return
      }

      currentUser = user
      currentTheme = user.theme || 'classic'
      document.getElementById('user-name').textContent = user.display_name
      renderSettings()

    } catch (err) {
      document.getElementById('content').innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:#aaa;">
          <p style="font-size:14px;margin-bottom:8px;">Something went wrong loading settings.</p>
          <button onclick="window.location.href='/dashboard.html'" style="background:#1D9E75;color:white;border:none;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;">Back to dashboard</button>
        </div>`
    }
  }

  function renderSettings() {
    const u = currentUser
    const isSchool = u.account_subtype === 'student_school'
    const isHome = u.account_subtype === 'student_home'
    const isSolo = u.account_type === 'solo'
    const isTeacher = u.account_type === 'teacher'
    const isParent = u.account_type === 'parent'
    const isStudent = u.account_type === 'student'
    const flagCount = u.flag_count || 0
    const flagColor = flagCount >= 4 ? '#A32D2D' : flagCount >= 2 ? '#854F0B' : '#0F6E56'

    let accountLabel = ''
    if (isSchool) accountLabel = '<span class="chip cb">🏫 School account</span>'
    else if (isHome) accountLabel = '<span class="chip cp">🏠 Home account</span>'
    else if (isTeacher) accountLabel = '<span class="chip cg">📚 Teacher</span>'
    else if (isParent) accountLabel = '<span class="chip" style="background:#F0E6FF;color:#5B21B6;">👨‍👩‍👧 Parent</span>'
    else accountLabel = '<span class="chip cg">🌍 Solo learner</span>'

    const themeButtons = THEMES ? Object.entries(THEMES).map(([key, t]) => `
      <button type="button" class="theme-btn${key === currentTheme ? ' selected' : ''}" id="theme-btn-${key}" onclick="pickTheme('${key}')">
        <span class="theme-emoji">${t.emoji}</span>
        <span class="theme-name">${t.name}</span>
      </button>`).join('') : '' `
      <button type="button" class="theme-btn${key === currentTheme ? ' selected' : ''}" id="theme-btn-${key}" onclick="pickTheme('${key}')">
        <span class="theme-emoji">${t.emoji}</span>
        <span class="theme-name">${t.name}</span>
      </button>`).join('')

    document.getElementById('content').innerHTML = `
      <div class="page-title">⚙ Settings</div>
      <div class="page-sub">Manage your account, display preferences, and languages.</div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">My profile</div>
          <div class="section-sub">Your account information</div>
        </div>
        <div class="profile-field">
          <div class="pf-label">Display name</div>
          <div class="pf-value" id="val-display">${u.display_name}</div>
          <button class="pf-edit" onclick="toggleEditName()">Edit</button>
        </div>
        <div id="edit-name-area" style="display:none;padding:11px 18px;border-top:1px solid #e5e3dc;">
          <input class="pf-input" id="new-display" value="${u.display_name}" placeholder="New display name">
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button class="save-btn" style="margin:0;" onclick="saveDisplayName()">Save</button>
            <button onclick="toggleEditName()" style="background:none;border:1px solid #ddd;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;color:#888;">Cancel</button>
          </div>
        </div>
        <div class="profile-field">
          <div class="pf-label">Full name</div>
          <div class="pf-value">${u.full_name}</div>
        </div>
        <div class="profile-field">
          <div class="pf-label">Email</div>
          <div class="pf-value">${u.email}</div>
        </div>
        <div class="profile-field">
          <div class="pf-label">Account type</div>
          <div class="pf-value">${accountLabel}</div>
        </div>
        ${u.age ? `<div class="profile-field"><div class="pf-label">Age</div><div class="pf-value">${u.age}</div></div>` : ''}
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">🎨 App theme</div>
          <div class="section-sub">Choose how Lingua Letters looks and feels</div>
        </div>
        <div class="theme-grid">${themeButtons}</div>
        <div class="theme-saved" id="theme-saved">✓ Theme saved!</div>
      </div>

      ${isStudent || isSolo ? `
      <div class="section">
        <div class="section-header">
          <div class="section-title">Display language</div>
          <div class="section-sub">How letters appear in your inbox by default</div>
        </div>
        <div class="setting-row">
          <div class="sr-info">
            <div class="sr-label">Show letters in</div>
            <div class="sr-sub">You can also switch this from inside any letter.</div>
          </div>
          <select id="lang-display" onchange="saveLangPref(this.value)">
            <option value="target">Target language</option>
            <option value="english">English</option>
            <option value="both">Both side by side</option>
          </select>
        </div>
        ${isSolo ? `
        <div class="setting-row">
          <div class="sr-info"><div class="sr-label">Challenge mode</div><div class="sr-sub">No translation hints — read letters exactly as written.</div></div>
          <label class="tog"><input type="checkbox"><span class="tsl"></span></label>
        </div>` : ''}
        ${isSchool ? `<div class="ibox">🏫 Your teacher may override display settings for your class.</div>` : ''}
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Languages I am learning</div>
          <div class="section-sub">Tap to select your primary language</div>
        </div>
        <div class="lang-chips">
          ${LANGS.map(l => `<div class="lang-chip${l === (u.learning_language || 'Spanish') ? ' on' : ''}" onclick="selectLang(this,'${l}')">${l}</div>`).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Add a pen pal</div>
          <div class="section-sub">Two ways to connect with someone new</div>
        </div>
        <div class="connect-row">
          <div style="font-size:13px;font-weight:500;margin-bottom:4px;">📱 Your connection code</div>
          <div style="font-size:11px;color:#aaa;margin-bottom:6px;">Share this in person to connect instantly.</div>
          <div><span class="code-box" id="my-code">Loading...</span><button class="copy-btn" onclick="copyCode()">📋 Copy</button></div>
        </div>
        <div class="connect-row">
          <div style="font-size:13px;font-weight:500;margin-bottom:4px;">🔗 Go to pen pals page</div>
          <div style="font-size:11px;color:#aaa;margin-bottom:8px;">Enter someone else's code to connect as pen pals.</div>
          <button onclick="window.location.href='/penpals.html'" style="background:#1D9E75;color:white;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;">Open pen pals →</button>
        </div>
      </div>` : ''}

      <div class="section">
        <div class="section-header">
          <div class="section-title">Account safety</div>
        </div>
        <div class="setting-row">
          <div class="sr-info">
            <div class="sr-label">Flag count</div>
            <div class="sr-sub">Letters held for inappropriate content.</div>
          </div>
          <div style="font-size:16px;font-weight:500;color:${flagColor};">${flagCount}</div>
        </div>
        <div class="setting-row">
          <div class="sr-info"><div class="sr-label">AI moderation</div><div class="sr-sub">Always on — cannot be disabled.</div></div>
          <label class="tog"><input type="checkbox" checked disabled><span class="tsl"></span></label>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Notifications</div>
        </div>
        <div class="setting-row">
          <div class="sr-info"><div class="sr-label">New letter received</div><div class="sr-sub">Get notified when a pen pal sends you a letter.</div></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
        <div class="setting-row">
          <div class="sr-info"><div class="sr-label">Letter flagged</div><div class="sr-sub">Always notified when a letter is flagged. Cannot be turned off.</div></div>
          <label class="tog"><input type="checkbox" checked disabled><span class="tsl"></span></label>
        </div>
      </div>

      <div class="section">
        <div class="section-header" style="background:#FFF8F8;">
          <div class="section-title" style="color:#A32D2D;">Danger zone</div>
        </div>
        <div style="padding:16px 18px;">
          <div style="font-size:13px;font-weight:500;margin-bottom:4px;">Delete my account</div>
          <div style="font-size:12px;color:#aaa;margin-bottom:12px;line-height:1.5;">Permanently deletes your account and all letters. Cannot be undone.</div>
          <button class="danger-btn" onclick="confirmDelete()">Delete my account</button>
        </div>
      </div>
    `

    loadMyCode()
  }

  window.pickTheme = async function(key) {
    currentTheme = key
    // Update button styles
    Object.keys(THEMES).forEach(k => {
      const btn = document.getElementById('theme-btn-' + k)
      if (!btn) return
      btn.classList.toggle('selected', k === key)
    })
    // Apply immediately
    applyTheme(key)
    // Save to Supabase
    await supabase.from('users').update({ theme: key }).eq('id', currentUser.id)
    // Show saved confirmation
    const saved = document.getElementById('theme-saved')
    if (saved) {
      saved.style.display = 'block'
      setTimeout(() => saved.style.display = 'none', 2000)
    }
  }

  async function loadMyCode() {
    const el = document.getElementById('my-code')
    if (!el) return
    try {
      const { data } = await supabase
        .from('connection_codes').select('code')
        .eq('student_id', currentUser.id).eq('used', false).single()
      if (data) { el.textContent = data.code; return }
      const code = 'LL-' + Math.random().toString(36).substring(2, 6).toUpperCase()
      await supabase.from('connection_codes').insert({ student_id: currentUser.id, code, used: false })
      el.textContent = code
    } catch (e) {
      if (el) el.textContent = 'LL-' + Math.random().toString(36).substring(2, 6).toUpperCase()
    }
  }

  window.copyCode = function() {
    const code = document.getElementById('my-code').textContent
    navigator.clipboard.writeText(code)
    const btn = document.querySelector('.copy-btn')
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => btn.textContent = '📋 Copy', 2000) }
  }

  window.toggleEditName = function() {
    const area = document.getElementById('edit-name-area')
    area.style.display = area.style.display === 'none' ? 'block' : 'none'
  }

  window.saveDisplayName = async function() {
    const newName = document.getElementById('new-display').value.trim()
    if (!newName) { alert('Please enter a display name.'); return }
    const { error } = await supabase.from('users').update({ display_name: newName }).eq('id', currentUser.id)
    if (error) { alert('Error: ' + error.message); return }
    currentUser.display_name = newName
    document.getElementById('val-display').textContent = newName
    document.getElementById('user-name').textContent = newName
    document.getElementById('edit-name-area').style.display = 'none'
    alert('Display name updated!')
  }

  window.saveLangPref = function(val) {
    localStorage.setItem('lingua_lang_display', val)
  }

  window.selectLang = async function(el, lang) {
    document.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('on'))
    el.classList.add('on')
    await supabase.from('users').update({ learning_language: lang }).eq('id', currentUser.id)
    currentUser.learning_language = lang
  }

  window.confirmDelete = function() {
    if (confirm('Are you sure? This cannot be undone.')) {
      if (confirm('This will permanently delete all your letters. Are you absolutely sure?')) {
        alert('Account deletion request submitted. Your account will be deleted within 24 hours.')
      }
    }
  }

  window.handleSignOut = async function() {
    await supabase.auth.signOut()
    window.location.href = '/login.html'
  }

  init()
</script>
</body>
</html>
