<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 36px; width: 100%; max-width: 400px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .orb { width: 36px; height: 36px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-size: 20px; font-weight: 500; color: #1a1a1a; }
    .tabs { display: flex; border: 1px solid #e5e3dc; border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
    .tab { flex: 1; padding: 9px 0; font-size: 13px; text-align: center; cursor: pointer; background: none; border: none; color: #888; }
    .tab.on { background: #1D9E75; color: white; font-weight: 500; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #e5e3dc; border-radius: 9px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: white; outline: none; }
    input:focus, select:focus { border-color: #1D9E75; }
    .btn { width: 100%; padding: 11px; background: #1D9E75; color: white; border: none; border-radius: 9px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 6px; }
    .btn:hover { background: #0F6E56; }
    .error { background: #FCEBEB; color: #A32D2D; padding: 10px 12px; border-radius: 9px; font-size: 12px; margin-bottom: 16px; display: none; }
    .success { background: #E1F5EE; color: #0F6E56; padding: 10px 12px; border-radius: 9px; font-size: 12px; margin-bottom: 16px; display: none; }
    .account-type-note { font-size: 11px; color: #888; background: #F8F7F4; padding: 10px 12px; border-radius: 9px; margin-bottom: 16px; line-height: 1.6; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="orb">✉</div>
    <div class="logo-text">Lingua Letters</div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="showTab('login')">Sign in</button>
    <button class="tab" onclick="showTab('signup')">Create account</button>
  </div>
  <div id="error-box" class="error"></div>
  <div id="success-box" class="success"></div>
  <div id="login-form">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="login-email" placeholder="you@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="handleLogin()">Sign in</button>
  </div>
  <div id="signup-form" style="display:none;">
    <div class="form-group">
      <label>I am a...</label>
      <select id="account-type" onchange="handleAccountTypeChange()">
        <option value="">— Select account type —</option>
        <option value="student">Student</option>
        <option value="parent">Parent or Guardian</option>
        <option value="teacher">Teacher</option>
        <option value="solo">Solo learner (18+)</option>
      </select>
    </div>
    <div id="account-note" class="account-type-note"></div>
    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="signup-name" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label>Display name (shown to pen pals)</label>
      <input type="text" id="signup-display" placeholder="e.g. Alex or Ms. García">
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="signup-email" placeholder="you@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="At least 8 characters">
    </div>
    <div class="form-group" id="age-group" style="display:none;">
      <label>Your age</label>
      <input type="number" id="signup-age" placeholder="e.g. 15" min="8" max="100">
    </div>
    <div class="form-group" id="parent-email-group" style="display:none;">
      <label>Parent or guardian email (required for under 18)</label>
      <input type="email" id="parent-email" placeholder="parent@email.com">
    </div>
    <div class="form-group" id="language-group" style="display:none;">
      <label>Language I am learning</label>
      <select id="learning-language">
        <option value="Spanish">Spanish</option>
        <option value="French">French</option>
        <option value="Italian">Italian</option>
        <option value="Korean">Korean</option>
        <option value="Japanese">Japanese</option>
        <option value="German">German</option>
        <option value="Portuguese">Portuguese</option>
        <option value="Mandarin">Mandarin</option>
      </select>
    </div>
    <button class="btn" onclick="handleSignup()">Create account</button>
  </div>
</div>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://vfohvovtxklsdvpigycx.supabase.co',
    'sb_publishable_iOcoEodjREKpEL1B7DqRSg_k4cKFSEu'
  )

  const NOTES = {
    student: '🏫 School account — your teacher and parent can see your letters and flag activity.',
    parent: '👨‍👩‍👧 You will be connected to your child\'s account to receive flag notifications.',
    teacher: '📚 You can create a class, match students, and review flagged letters.',
    solo: '🌍 Independent learner — AI moderation on. 5 flags without explanation disables your account.'
  }

  window.showTab = function(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none'
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none'
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', (i === 0) === (tab === 'login')))
    document.getElementById('error-box').style.display = 'none'
    document.getElementById('success-box').style.display = 'none'
  }

  window.handleAccountTypeChange = function() {
    const type = document.getElementById('account-type').value
    const note = document.getElementById('account-note')
    note.textContent = NOTES[type] || ''
    note.style.display = type ? 'block' : 'none'
    document.getElementById('age-group').style.display = type === 'student' ? 'block' : 'none'
    document.getElementById('language-group').style.display = (type === 'student' || type === 'solo') ? 'block' : 'none'
    document.getElementById('parent-email-group').style.display = 'none'
  }

  document.getElementById('signup-age').addEventListener('blur', function() {
    const age = parseInt(this.value)
    document.getElementById('parent-email-group').style.display = (age && age < 18) ? 'block' : 'none'
  })

  window.handleLogin = async function() {
    const email = document.getElementById('login-email').value
    const password = document.getElementById('login-password').value
    if (!email || !password) { showError('Please fill in all fields.'); return }
    const { error } = await supabase.auth.signInWithPassword({ email, password })
    if (error) { showError(error.message); return }
    window.location.href = '/dashboard.html'
  }

  window.handleSignup = async function() {
    const accountType = document.getElementById('account-type').value
    const name = document.getElementById('signup-name').value
    const displayName = document.getElementById('signup-display').value
    const email = document.getElementById('signup-email').value
    const password = document.getElementById('signup-password').value
    const age = document.getElementById('signup-age').value
    const learningLanguage = document.getElementById('learning-language').value

    if (!accountType || !name || !displayName || !email || !password) {
      showError('Please fill in all required fields.'); return
    }
    if (password.length < 8) {
      showError('Password must be at least 8 characters.'); return
    }
    if (accountType === 'student' && age && parseInt(age) < 18) {
      if (!document.getElementById('parent-email').value) {
        showError('A parent or guardian email is required for students under 18.'); return
      }
    }

    const { data, error } = await supabase.auth.signUp({ email, password })
    if (error) { showError(error.message); return }

    const { error: profileError } = await supabase.from('users').insert({
      id: data.user.id,
      email,
      full_name: name,
      display_name: displayName,
      account_type: accountType,
      age: age ? parseInt(age) : null,
      learning_language: learningLanguage || 'English'
    })

    if (profileError) { showError(profileError.message); return }
    showSuccess('Account created! Check your email to confirm, then sign in.')
  }

  function showError(msg) {
    const el = document.getElementById('error-box')
    el.textContent = msg
    el.style.display = 'block'
    document.getElementById('success-box').style.display = 'none'
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-box')
    el.textContent = msg
    el.style.display = 'block'
    document.getElementById('error-box').style.display = 'none'
  }
</script>
</body>
</html>
