<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Confirming your account…</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 36px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
    .orb { width: 48px; height: 48px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 16px; }
    h2 { font-size: 18px; color: #1a1a1a; margin-bottom: 8px; }
    p { font-size: 13px; color: #888; }
    .error { color: #A32D2D; }
  </style>
</head>
<body>
<div class="card">
  <div class="orb">✉</div>
  <h2 id="title">Confirming your account…</h2>
  <p id="msg">Please wait a moment.</p>
</div>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://vfohvovtxklsdvpigycx.supabase.co',
    'sb_publishable_iOcoEodjREKpEL1B7DqRSg_k4cKFSEu'
  )

  const title = document.getElementById('title')
  const msg = document.getElementById('msg')

  // Supabase puts the code in the URL as ?code=...
  const params = new URLSearchParams(window.location.search)
  const code = params.get('code')

  if (code) {
    const { error } = await supabase.auth.exchangeCodeForSession(code)
    if (error) {
      title.textContent = 'Something went wrong'
      msg.innerHTML = '<span class="error">' + error.message + '</span><br><br>Please try signing up again or contact support.'
    } else {
      title.textContent = 'Email confirmed!'
      msg.textContent = 'Taking you to your dashboard…'
      setTimeout(() => { window.location.href = '/dashboard.html' }, 1500)
    }
  } else {
    title.textContent = 'Invalid link'
    msg.textContent = 'This confirmation link is missing a code. Please check your email for the correct link, or try signing up again.'
  }
</script>
</body>
</html>
