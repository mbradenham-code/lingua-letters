}

const SUGGESTIONS = ['What do kids do after school?','What is the most popular food?','Tell me about a big celebration','What sports are popular here?','What should I write to my pen pal?']

let chatHistory = []
let isSending = false
let currentCountryName = ''
let currentISO = ''
let activePolygon = null

// ── Flag helper ──────────────────────────────────────────────────────────────
function flagHTML(iso, name) {
  const code = iso.toLowerCase()
  return '<img class="country-flag-img" src="https://flagcdn.com/w80/' + code + '.png" onerror="this.style.display=\'none\'" alt="' + name + ' flag">'
}

// ── Search ──────────────────────────────────────────────────────────────────
window.searchCountries = function(val) {
  const res = document.getElementById('search-results')
  if (!val.trim()) { res.style.display = 'none'; return }
  const matches = Object.entries(DATA).filter(([iso, c]) =>
    c.name.toLowerCase().includes(val.toLowerCase())
  ).slice(0, 8)
  if (matches.length === 0) { res.style.display = 'none'; return }
  res.style.display = 'block'
  res.innerHTML = matches.map(([iso, c]) =>
    `<div class="search-result" onclick="selectFromSearch('${iso}')">${c.flag} ${c.name}</div>`
  ).join('')
}

window.hideSearch = function() {
  document.getElementById('search-results').style.display = 'none'
}

window.selectFromSearch = function(iso) {
  document.getElementById('search-input').value = ''
  document.getElementById('search-results').style.display = 'none'
  showCountry(iso)

  if (polygonSeries) {
    polygonSeries.mapPolygons.each(function(polygon) {
      const id = polygon.dataItem?.get('id')
      if (id === iso) {
        if (activePolygon && activePolygon !== polygon) activePolygon.states.applyAnimate('default')
        polygon.states.applyAnimate('active')
        activePolygon = polygon
        chart.zoomToDataItem(polygon.dataItem, 3, true)
      }
    })
  }
}

// ── Map setup ────────────────────────────────────────────────────────────────
const root = am5.Root.new('chartdiv')
root.setThemes([am5themes_Animated.new(root)])

const chart = root.container.children.push(
  am5map.MapChart.new(root, {
    panX: 'rotateX',
    panY: 'translateY',
    projection: am5map.geoNaturalEarth1(),
    paddingBottom: 20,
    paddingTop: 20
  })
)

const polygonSeries = chart.series.push(
  am5map.MapPolygonSeries.new(root, {
    geoJSON: am5geodata_worldLow,
    exclude: ['AQ']
  })
)

polygonSeries.mapPolygons.template.setAll({
  tooltipText: '{name}',
  interactive: true,
  fill: am5.color(0x7CB9D8),
  stroke: am5.color(0xFFFFFF),
  strokeWidth: 0.5,
  cursorOverStyle: 'pointer'
})

polygonSeries.mapPolygons.template.states.create('hover', {
  fill: am5.color(0x1D9E75)
})

polygonSeries.mapPolygons.template.states.create('active', {
  fill: am5.color(0x0F6E56)
})

chart.set('zoomControl', am5map.ZoomControl.new(root, {}))

polygonSeries.mapPolygons.template.events.on('click', function(ev) {
  if (activePolygon && activePolygon !== ev.target) {
    activePolygon.states.applyAnimate('default')
  }
  ev.target.states.applyAnimate('active')
  activePolygon = ev.target
  const iso = ev.target.dataItem?.get('id')
  if (iso) showCountry(iso)
})

// ── Panel ────────────────────────────────────────────────────────────────────
async function showCountry(iso) {
  document.getElementById('panel-empty').style.display = 'none'
  const body = document.getElementById('panel-body')
  body.style.display = 'block'
  chatHistory = []
  currentISO = iso

  const pre = DATA[iso]
  if (pre) {
    renderCountry(pre, iso)
    return
  }

  body.innerHTML = '<div class="loading-panel"><div class="spin"></div>Loading cultural info…</div>'
  try {
    const r = await fetch('/api/culture-info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'info', country: iso })
    })
    const { result } = await r.json()
    renderCountry(result, iso)
  } catch(e) {
    body.innerHTML = `<div class="loading-panel">Couldn't load info for this country.<br><br>Try asking below!</div>`
  }
}

function renderCountry(c, iso) {
  currentCountryName = c.name
  const isoCode = iso || currentISO || ''
  document.getElementById('panel-body').innerHTML = `
    <div class="country-hero">
      <div class="country-top">
        ${flagHTML(isoCode, c.name)}
        <div>
          <div class="country-name">${c.name}</div>
          <div class="country-region">${c.region}</div>
        </div>
      </div>
      <div class="quick-grid">
        <div class="quick-item"><div class="quick-label">🏛 Capital</div><div class="quick-value">${c.capital}</div></div>
        <div class="quick-item"><div class="quick-label">👥 Population</div><div class="quick-value">${c.population}</div></div>
        <div class="quick-item"><div class="quick-label">🗣 Languages</div><div class="quick-value">${c.languages}</div></div>
        <div class="quick-item"><div class="quick-label">🏙 Major cities</div><div class="quick-value">${c.cities}</div></div>
      </div>
    </div>
    <div class="info-section">
      <div class="section-title">🍜 Food & drink</div>
      <div class="info-list">${c.food.map(f=>`<div class="info-item">${f}</div>`).join('')}</div>
    </div>
    <div class="info-section">
      <div class="section-title">🎉 Festivals & celebrations</div>
      <div class="info-list">${c.festivals.map(f=>`<div class="info-item">${f}</div>`).join('')}</div>
    </div>
    <div class="info-section">
      <div class="section-title">🏫 School life</div>
      <div class="info-list">${c.school.map(s=>`<div class="info-item">${s}</div>`).join('')}</div>
    </div>
    <div class="info-section">
      <div class="section-title">💬 Great pen pal topics</div>
      <div class="chips">${c.topics.map(t=>`<span class="chip-green">${t}</span>`).join('')}</div>
    </div>
    <div class="info-section">
      <div class="section-title">💡 Cultural tips</div>
      <div class="chips">${c.tips.map(t=>`<span class="chip-amber">${t}</span>`).join('')}</div>
    </div>
    <div class="chat-wrap">
      <div class="chat-head">💬 Ask anything about ${c.name}</div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-sugg">
        ${SUGGESTIONS.map(s=>`<button class="sugg-btn" onclick="askSugg('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('')}
      </div>
      <div class="chat-row">
        <input class="chat-in" id="chat-in" placeholder="Ask me anything…" onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="chat-btn" id="chat-btn" onclick="sendMsg()">→</button>
      </div>
    </div>`
}

window.askSugg = function(t) {
  document.getElementById('chat-in').value = t
  sendMsg()
}

window.sendMsg = async function() {
  const input = document.getElementById('chat-in')
  const text = input.value.trim()
  if (!text || isSending) return
  input.value = ''
  addMsg('user', text)
  isSending = true
  document.getElementById('chat-btn').disabled = true
  const t = document.createElement('div')
  t.className = 'msg thinking'; t.id = 'think'; t.textContent = 'Thinking…'
  document.getElementById('chat-msgs').appendChild(t)
  document.getElementById('chat-msgs').scrollTop = 99999
  chatHistory.push({ role:'user', content:text })
  try {
    const r = await fetch('/api/culture-info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type:'chat', country:currentCountryName, message:text, history:chatHistory.slice(0,-1) })
    })
    const { result } = await r.json()
    document.getElementById('think')?.remove()
    addMsg('ai', result)
    chatHistory.push({ role:'assistant', content:result })
  } catch(e) {
    document.getElementById('think')?.remove()
    addMsg('ai', 'Sorry, I had trouble connecting. Please try again!')
  }
  isSending = false
  document.getElementById('chat-btn').disabled = false
}

function addMsg(type, text) {
  const msgs = document.getElementById('chat-msgs')
  if (!msgs) return
  const d = document.createElement('div')
  d.className = `msg ${type}`; d.textContent = text
  msgs.appendChild(d); msgs.scrollTop = 99999
}
</script>
</body>
</html>
