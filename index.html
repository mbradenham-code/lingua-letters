<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #F1EFE8;
    }
    .splash {
      text-align: center;
    }
    .orb {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #1D9E75;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: #888;
      margin-bottom: 28px;
    }
    .btn {
      background: #1D9E75;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
    }
    .btn:hover { background: #0F6E56; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="orb">✉</div>
    <h1>Lingua Letters</h1>
    <p>A cultural pen pal platform for language learners.</p>
    <a class="btn" href="#">Coming soon — sign up to be notified</a>
  </div>
</body>
</html>
