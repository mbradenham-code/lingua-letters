<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters — Students</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; min-height: 100vh; }
    .topbar { background: white; border-bottom: 1px solid #e5e3dc; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 500; color: #1a1a1a; }
    .orb { width: 26px; height: 26px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .spacer { flex: 1; }
    .back { font-size: 13px; color: #1D9E75; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .content { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .page-header { background: white; border-radius: 14px; padding: 24px 28px; margin-bottom: 20px; border: 1px solid #e5e3dc; display: flex; align-items: center; justify-content: space-between; }
    .page-header h1 { font-size: 20px; font-weight: 500; }
    .page-header p { font-size: 13px; color: #888; margin-top: 4px; }
    .class-code-box { background: #E1F5EE; border-radius: 10px; padding: 10px 16px; text-align: center; }
    .class-code-label { font-size: 10px; color: #0F6E56; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .class-code { font-size: 20px; font-weight: 600; color: #1D9E75; letter-spacing: .05em; }
    .card { background: white; border-radius: 14px; border: 1px solid #e5e3dc; overflow: hidden; }
    .student-row { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border-bottom: 1px solid #f0ede6; }
    .student-row:last-child { border-bottom: none; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .student-info { flex: 1; }
    .student-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .student-meta { font-size: 12px; color: #aaa; margin-top: 2px; }
    .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; }
    .status-active { background: #E1F5EE; color: #0F6E56; }
    .status-flagged { background: #FAEEDA; color: #854F0B; }
    .status-unmatched { background: #F1EFE8; color: #888; }
    .empty { text-align: center; padding: 48px 20px; color: #aaa; font-size: 14px; line-height: 1.7; }
    .loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="orb">✉</div>Lingua Letters</div>
  <div class="spacer"></div>
  <a class="back" href="/dashboard.html">← Dashboard</a>
</div>
<div class="content">
  <div class="page-header">
    <div>
      <h1>👥 Students</h1>
      <p>Students who have joined your class.</p>
    </div>
    <div class="class-code-box">
      <div class="class-code-label">Your class code</div>
      <div class="class-code" id="class-code">—</div>
    </div>
  </div>
  <div id="loading" class="loading">Loading students…</div>
  <div id="student-list" class="card" style="display:none;"></div>
</div>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://vfohvovtxklsdvpigycx.supabase.co',
    'sb_publishable_iOcoEodjREKpEL1B7DqRSg_k4cKFSEu'
  )

  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.href = '/login.html' }

  const { data: me } = await supabase.from('users').select('*').eq('id', session.user.id).single()
  if (!me || me.account_type !== 'teacher') { window.location.href = '/dashboard.html' }

  // Get class code
  const { data: myClass } = await supabase.from('classes').select('class_code').eq('teacher_id', me.id).single()
  if (myClass) document.getElementById('class-code').textContent = myClass.class_code

  // Get students
  const { data: students } = await supabase
    .from('users')
    .select('id, display_name, full_name, learning_language, age')
    .eq('account_type', 'student')
    .eq('teacher_id', me.id)
    .order('full_name')

  // Get flag counts per student
  const { data: flags } = await supabase
    .from('flags')
    .select('student_id')
    .eq('outcome', 'pending')

  const flagCounts = {}
  if (flags) flags.forEach(f => { flagCounts[f.student_id] = (flagCounts[f.student_id] || 0) + 1 })

  document.getElementById('loading').style.display = 'none'
  const list = document.getElementById('student-list')
  list.style.display = 'block'

  if (!students || students.length === 0) {
    list.innerHTML = `<div class="empty">No students yet.<br>Share your class code <strong>${myClass?.class_code || ''}</strong> so students can join.</div>`
  } else {
    list.innerHTML = students.map(s => {
      const initials = (s.display_name || s.full_name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2)
      const flagCount = flagCounts[s.id] || 0
      const statusClass = flagCount > 0 ? 'status-flagged' : 'status-active'
      const statusLabel = flagCount > 0 ? `⚠ ${flagCount} flag${flagCount > 1 ? 's' : ''}` : 'Active'
      return `
        <div class="student-row">
          <div class="avatar">${initials}</div>
          <div class="student-info">
            <div class="student-name">${s.display_name || s.full_name}</div>
            <div class="student-meta">Learning ${s.learning_language || '—'}${s.age ? ' · Age ' + s.age : ''}</div>
          </div>
          <span class="status-badge ${statusClass}">${statusLabel}</span>
        </div>
      `
    }).join('')
  }
</script>
</body>
</html>
