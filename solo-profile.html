<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters — Solo Learner Profile Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; min-height: 100vh; }
    .topbar { background: white; border-bottom: 1px solid #e5e3dc; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 500; color: #1a1a1a; }
    .orb { width: 26px; height: 26px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .spacer { flex: 1; }
    .back { font-size: 13px; color: #1D9E75; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .content { max-width: 680px; margin: 40px auto; padding: 0 20px; }
    .page-header { background: white; border-radius: 14px; padding: 24px 28px; margin-bottom: 20px; border: 1px solid #e5e3dc; }
    .page-header h1 { font-size: 20px; font-weight: 500; }
    .page-header p { font-size: 13px; color: #888; margin-top: 4px; }
    .card { background: white; border-radius: 14px; border: 1px solid #e5e3dc; margin-bottom: 16px; overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #f0ede6; font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .card-body { padding: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #e5e3dc; border-radius: 9px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: white; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #1D9E75; }
    textarea { resize: vertical; min-height: 90px; }
    .photo-section { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .photo-preview { width: 80px; height: 80px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; color: white; font-size: 26px; font-weight: 600; flex-shrink: 0; overflow: hidden; }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .photo-options { flex: 1; }
    .photo-tabs { display: flex; border: 1px solid #e5e3dc; border-radius: 9px; overflow: hidden; margin-bottom: 12px; }
    .photo-tab { flex: 1; padding: 7px 0; font-size: 12px; text-align: center; cursor: pointer; background: none; border: none; color: #888; }
    .photo-tab.on { background: #1D9E75; color: white; font-weight: 500; }
    .upload-btn { display: inline-block; padding: 8px 14px; background: #F1EFE8; border: 1px solid #e5e3dc; border-radius: 9px; font-size: 12px; color: #555; cursor: pointer; }
    .upload-btn:hover { background: #e5e3dc; }
    .field-hint { font-size: 11px; color: #aaa; margin-top: 6px; }
    .save-bar { background: white; border-radius: 14px; border: 1px solid #e5e3dc; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    .btn { padding: 10px 22px; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: #1D9E75; color: white; }
    .btn:hover { background: #0F6E56; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .save-msg { font-size: 13px; display: none; }
    .loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="orb">✉</div>Lingua Letters</div>
  <div class="spacer"></div>
  <a class="back" href="/dashboard.html">← Dashboard</a>
</div>

<div class="content">
  <div class="page-header">
    <h1>⚙ Profile Settings</h1>
    <p>Your profile is shown to other solo learners in the network.</p>
  </div>

  <div id="loading" class="loading">Loading your profile…</div>
  <div id="form-content" style="display:none;">

    <div class="card">
      <div class="card-header">📷 Profile photo</div>
      <div class="card-body">
        <div class="photo-section">
          <div class="photo-preview" id="photo-preview">
            <span id="photo-initials"></span>
          </div>
          <div class="photo-options">
            <div class="photo-tabs">
              <button class="photo-tab on" onclick="switchPhotoTab('upload')">Upload photo</button>
              <button class="photo-tab" onclick="switchPhotoTab('url')">Use URL</button>
            </div>
            <div id="tab-upload">
              <label class="upload-btn" for="photo-file">Choose a photo from your device</label>
              <input type="file" id="photo-file" accept="image/*" style="display:none;" onchange="previewUpload(this)">
              <div class="field-hint">JPG, PNG or GIF. Max 2MB.</div>
            </div>
            <div id="tab-url" style="display:none;">
              <input type="url" id="photo-url" placeholder="https://example.com/photo.jpg" oninput="previewUrl(this.value)">
              <div class="field-hint">Paste a direct link to your photo.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">👤 Basic info</div>
      <div class="card-body">
        <div class="form-group">
          <label>Display name (shown to pen pals)</label>
          <input type="text" id="display-name" placeholder="e.g. Alex">
        </div>
        <div class="form-group">
          <label>Bio (tell other learners about yourself)</label>
          <textarea id="bio" placeholder="e.g. Adult learner based in Canada, learning Spanish for travel. Love cooking and hiking."></textarea>
        </div>
        <div class="form-group">
          <label>Country</label>
          <input type="text" id="country" placeholder="e.g. Canada">
        </div>
        <div class="form-group">
          <label>Language I am learning</label>
          <select id="learning-language">
            <option value="English">English</option>
            <option value="Spanish">Spanish</option>
            <option value="French">French</option>
            <option value="Italian">Italian</option>
            <option value="Korean">Korean</option>
            <option value="Japanese">Japanese</option>
            <option value="German">German</option>
            <option value="Portuguese">Portuguese</option>
            <option value="Mandarin">Mandarin</option>
          </select>
        </div>
      </div>
    </div>

    <div class="save-bar">
      <span class="save-msg" id="save-msg"></span>
      <button class="btn" id="save-btn" onclick="saveProfile()">Save profile</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase
  const sb = createClient(
    'https://vfohvovtxklsdvpigycx.supabase.co',
    'sb_publishable_iOcoEodjREKpEL1B7DqRSg_k4cKFSEu'
  )

  let me = null
  let uploadedFile = null
  let finalPhotoUrl = null

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = '/login.html'; return }

    const { data: user } = await sb.from('users').select('*').eq('id', session.user.id).single()
    if (!user || user.account_type !== 'solo') { window.location.href = '/dashboard.html'; return }

    me = user
    document.getElementById('loading').style.display = 'none'
    document.getElementById('form-content').style.display = 'block'

    document.getElementById('display-name').value = user.display_name || ''
    document.getElementById('bio').value = user.bio || ''
    document.getElementById('country').value = user.school_country || ''
    document.getElementById('learning-language').value = user.learning_language || 'English'

    const initials = (user.display_name || user.full_name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2)
    document.getElementById('photo-initials').textContent = initials

    if (user.profile_photo_url) {
      finalPhotoUrl = user.profile_photo_url
      showPhotoPreview(user.profile_photo_url)
      document.getElementById('photo-url').value = user.profile_photo_url
    }
  }

  function showPhotoPreview(url) {
    const preview = document.getElementById('photo-preview')
    preview.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='<span>${document.getElementById('photo-initials')?.textContent || '?'}</span>'">`
  }

  window.switchPhotoTab = function(tab) {
    document.querySelectorAll('.photo-tab').forEach((t, i) => t.classList.toggle('on', (i === 0) === (tab === 'upload')))
    document.getElementById('tab-upload').style.display = tab === 'upload' ? 'block' : 'none'
    document.getElementById('tab-url').style.display = tab === 'url' ? 'block' : 'none'
  }

  window.previewUpload = function(input) {
    const file = input.files[0]
    if (!file) return
    if (file.size > 2 * 1024 * 1024) { alert('Photo must be under 2MB.'); return }
    uploadedFile = file
    const reader = new FileReader()
    reader.onload = e => showPhotoPreview(e.target.result)
    reader.readAsDataURL(file)
  }

  window.previewUrl = function(url) {
    if (url) showPhotoPreview(url)
    finalPhotoUrl = url
    uploadedFile = null
  }

  window.saveProfile = async function() {
    const btn = document.getElementById('save-btn')
    const msg = document.getElementById('save-msg')
    btn.disabled = true
    btn.textContent = 'Saving…'

    if (uploadedFile) {
      const ext = uploadedFile.name.split('.').pop()
      const path = `${me.id}/avatar.${ext}`
      const { error: uploadError } = await sb.storage.from('avatars').upload(path, uploadedFile, { upsert: true })
      if (uploadError) {
        msg.textContent = 'Photo upload failed: ' + uploadError.message
        msg.style.color = '#A32D2D'
        msg.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Save profile'
        return
      }
      const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path)
      finalPhotoUrl = urlData.publicUrl
    } else if (document.getElementById('tab-url').style.display !== 'none') {
      finalPhotoUrl = document.getElementById('photo-url').value.trim() || null
    }

    const { error } = await sb.from('users').update({
      display_name: document.getElementById('display-name').value.trim(),
      bio: document.getElementById('bio').value.trim(),
      school_country: document.getElementById('country').value.trim(),
      learning_language: document.getElementById('learning-language').value,
      profile_photo_url: finalPhotoUrl
    }).eq('id', me.id)

    btn.disabled = false
    btn.textContent = 'Save profile'

    if (error) {
      msg.textContent = 'Error saving: ' + error.message
      msg.style.color = '#A32D2D'
    } else {
      msg.textContent = '✓ Profile saved!'
      msg.style.color = '#1D9E75'
    }
    msg.style.display = 'block'
    setTimeout(() => { msg.style.display = 'none' }, 3000)
  }

  init()
</script>
</body>
</html>
