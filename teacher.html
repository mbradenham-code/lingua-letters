<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters — Teacher Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; min-height: 100vh; }
    .topbar { background: white; border-bottom: 1px solid #e5e3dc; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 500; color: #1a1a1a; text-decoration: none; }
    .orb { width: 26px; height: 26px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .spacer { flex: 1; }
    .signout { font-size: 12px; color: #aaa; cursor: pointer; background: none; border: none; }
    .layout { display: flex; min-height: calc(100vh - 53px); }
    .sidebar { width: 220px; border-right: 1px solid #e5e3dc; background: #F8F7F4; padding: 16px 0; flex-shrink: 0; }
    .sb-label { font-size: 10px; color: #aaa; padding: 4px 16px 2px; letter-spacing: .06em; text-transform: uppercase; font-weight: 500; }
    .sb-item { display: flex; align-items: center; gap: 8px; padding: 7px 16px; font-size: 13px; color: #555; cursor: pointer; border-left: 2px solid transparent; }
    .sb-item:hover { background: white; }
    .sb-item.on { color: #0F6E56; background: #E1F5EE; border-left: 2px solid #1D9E75; font-weight: 500; }
    .badge { margin-left: auto; font-size: 10px; background: #FAEEDA; color: #854F0B; border-radius: 20px; padding: 1px 6px; }
    .main { flex: 1; padding: 28px 32px; overflow-y: auto; }
    .page-title { font-size: 20px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: white; border: 1px solid #e5e3dc; border-radius: 12px; padding: 16px; }
    .stat-val { font-size: 24px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
    .stat-lbl { font-size: 11px; color: #aaa; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .view-all { font-size: 12px; color: #0F6E56; cursor: pointer; background: none; border: none; }
    .card { background: white; border: 1px solid #e5e3dc; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .student-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #e5e3dc; }
    .student-row:last-child { border-bottom: none; }
    .av { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 11px; flex-shrink: 0; }
    .st-info { flex: 1; }
    .st-name { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
    .st-sub { font-size: 11px; color: #aaa; }
    .chip { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; padding: 2px 8px; border-radius: 20px; }
    .cg { background: #E1F5EE; color: #0F6E56; }
    .ca { background: #FAEEDA; color: #854F0B; }
    .cb { background: #E6F1FB; color: #0C447C; }
    .flag-card { border: 1px solid #FAC775; border-radius: 12px; padding: 16px; background: #FAEEDA; margin-bottom: 12px; }
    .flag-student { font-size: 11px; font-weight: 500; color: #854F0B; margin-bottom: 4px; }
    .flag-msg { font-size: 13px; color: #412402; font-style: italic; margin: 6px 0; }
    .flag-reason { font-size: 11px; color: #854F0B; margin-bottom: 8px; }
    .flag-explanation { background: white; border-radius: 8px; padding: 8px 10px; font-size: 11px; color: #555; margin-bottom: 10px; border: 1px solid #e5e3dc; }
    .flag-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .fbtn { padding: 5px 12px; font-size: 11px; border-radius: 7px; cursor: pointer; border: none; }
    .fa { background: #E1F5EE; color: #0F6E56; }
    .fr { background: #FCEBEB; color: #A32D2D; }
    .fn { background: #F8F7F4; color: #555; border: 1px solid #e5e3dc; }
    .connect-section { background: white; border: 1px solid #e5e3dc; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .class-code-display { font-size: 24px; font-weight: 500; color: #1D9E75; letter-spacing: 3px; background: #E1F5EE; border-radius: 8px; padding: 12px 20px; text-align: center; margin: 12px 0; }
    .input-row { display: flex; gap: 10px; }
    .connect-input { flex: 1; padding: 9px 12px; border: 1px solid #e5e3dc; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; }
    .connect-input:focus { border-color: #1D9E75; }
    .connect-btn { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .connect-btn:hover { background: #0F6E56; }
    .empty { padding: 24px; text-align: center; color: #aaa; font-size: 13px; }
    .loading { padding: 24px; text-align: center; color: #aaa; font-size: 13px; }
    .settings-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #e5e3dc; }
    .settings-row:last-child { border-bottom: none; }
    .sr-lbl { flex: 1; }
    .sr-lbl p { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
    .sr-lbl span { font-size: 11px; color: #aaa; line-height: 1.5; }
    .tog { position: relative; width: 34px; height: 19px; flex-shrink: 0; margin-top: 2px; }
    .tog input { opacity: 0; width: 0; height: 0; position: absolute; }
    .tsl { position: absolute; inset: 0; background: #ccc; border-radius: 20px; cursor: pointer; transition: background .18s; }
    .tsl::before { content: ""; position: absolute; width: 13px; height: 13px; left: 2px; top: 2px; background: white; border-radius: 50%; transition: transform .18s; }
    .tog input:checked + .tsl { background: #1D9E75; }
    .tog input:checked + .tsl::before { transform: translateX(15px); }
    .tog input:disabled + .tsl { opacity: .4; cursor: default; }
  </style>
</head>
<body>
<div class="topbar">
  <a class="logo" href="/dashboard.html"><div class="orb">✉</div>Lingua Letters</a>
  <div class="spacer"></div>
  <span style="font-size:13px;color:#555;" id="user-name"></span>
  <button class="signout" onclick="handleSignOut()">Sign out</button>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-label">Teacher</div>
    <div class="sb-item on" onclick="showView('dashboard')">📊 Dashboard</div>
    <div class="sb-item" onclick="showView('students')">👥 Students</div>
    <div class="sb-item" onclick="showView('flagged')">🚩 Flagged <span class="badge" id="flag-count">0</span></div>
    <div class="sb-item" onclick="showView('connect')">🔗 Connect classes</div>
    <div class="sb-item" onclick="showView('settings')">⚙ Class settings</div>
  </div>
  <div class="main" id="main-panel">
    <div class="loading">Loading...</div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://vfohvovtxklsdvpigycx.supabase.co',
    'sb_publishable_iOcoEodjREKpEL1B7DqRSg_k4cKFSEu'
  )

  let currentUser = null
  let students = []
  let flags = []
  let currentView = 'dashboard'

  async function init() {
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = '/login.html'; return }

    const { data: user } = await supabase
      .from('users')
      .select('*')
      .eq('id', session.user.id)
      .single()

    if (!user) { window.location.href = '/login.html'; return }
    if (user.account_type !== 'teacher') {
      window.location.href = '/dashboard.html'; return
    }

    currentUser = user
    document.getElementById('user-name').textContent = user.display_name
    await loadData()
    renderView()
  }

  async function loadData() {
    const { data: studs } = await supabase
      .from('users')
      .select('*')
      .eq('account_type', 'student')
      .eq('teacher_id', currentUser.id)

    students = studs || []

    const { data: flagData } = await supabase
      .from('flags')
      .select('*, student:users!flags_student_id_fkey(display_name,email)')
      .eq('outcome', 'pending')

    flags = flagData || []
    document.getElementById('flag-count').textContent = flags.length
  }

  window.showView = function(view) {
    currentView = view
    document.querySelectorAll('.sb-item').forEach((el, i) => {
      el.classList.toggle('on', i === ['dashboard','students','flagged','connect','settings'].indexOf(view))
    })
    renderView()
  }

  function renderView() {
    const panel = document.getElementById('main-panel')
    if (currentView === 'dashboard') renderDashboard(panel)
    else if (currentView === 'students') renderStudents(panel)
    else if (currentView === 'flagged') renderFlagged(panel)
    else if (currentView === 'connect') renderConnect(panel)
    else if (currentView === 'settings') renderSettings(panel)
  }

  function renderDashboard(panel) {
    panel.innerHTML = `
      <div class="page-title">Good to see you, ${currentUser.display_name}!</div>
      <div class="page-sub">Here's what's happening in your classes this week.</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">${students.length}</div><div class="stat-lbl">Students</div></div>
        <div class="stat-card"><div class="stat-val">0</div><div class="stat-lbl">Letters this week</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${flags.length > 0 ? '#854F0B' : '#1a1a1a'}">${flags.length}</div><div class="stat-lbl">Flagged</div></div>
        <div class="stat-card"><div class="stat-val">0</div><div class="stat-lbl">Active pen pal pairs</div></div>
      </div>
      <div class="section-header">
        <div class="section-title">Students</div>
        <button class="view-all" onclick="showView('students')">View all →</button>
      </div>
      <div class="card">
        ${students.length === 0
          ? `<div class="empty">No students yet. Share your class code so students can join!</div>`
          : students.slice(0,5).map(s => studentRow(s)).join('')}
      </div>
      ${flags.length > 0 ? `
      <div class="section-header">
        <div class="section-title">🚩 Needs your review</div>
        <button class="view-all" onclick="showView('flagged')">View all →</button>
      </div>
      ${flags.slice(0,2).map(f => flagCard(f)).join('')}` : ''}
    `
  }

  function renderStudents(panel) {
    panel.innerHTML = `
      <div class="page-title">👥 Students</div>
      <div class="page-sub">All students connected to your account.</div>
      <div class="card">
        ${students.length === 0
          ? `<div class="empty">No students yet! Share your class code from the Connect classes page.</div>`
          : students.map(s => studentRow(s)).join('')}
      </div>
    `
  }

  function renderFlagged(panel) {
    panel.innerHTML = `
      <div class="page-title">🚩 Flagged letters</div>
      <div class="page-sub">AI-held letters awaiting your review. Parents have been notified.</div>
      ${flags.length === 0
        ? `<div class="card"><div class="empty">All clear — nothing flagged right now! 🎉</div></div>`
        : flags.map(f => flagCard(f)).join('')}
    `
  }

  function renderConnect(panel) {
    const classCode = 'SP3-' + currentUser.id.substring(0, 6).toUpperCase()
    panel.innerHTML = `
      <div class="page-title">🔗 Connect classes</div>
      <div class="page-sub">Share your class code with students or connect with a partner class.</div>
      <div class="connect-section">
        <div class="section-title" style="margin-bottom:6px;">Your class code</div>
        <div style="font-size:13px;color:#888;margin-bottom:4px;">Share this with your students so they can join your class.</div>
        <div class="class-code-display">${classCode}</div>
        <button class="connect-btn" style="background:#E1F5EE;color:#0F6E56;border:1px solid #9FE1CB;width:100%;" onclick="navigator.clipboard.writeText('${classCode}').then(()=>alert('Copied!'))">📋 Copy class code</button>
      </div>
      <div class="connect-section">
        <div class="section-title" style="margin-bottom:6px;">Connect a partner class</div>
        <div style="font-size:13px;color:#888;margin-bottom:12px;">Enter a code from a teacher at another school to pair your classes as pen pals.</div>
        <div class="input-row">
          <input class="connect-input" id="partner-code" placeholder="Partner class code, e.g. MX-GDL-4B...">
          <button class="connect-btn" onclick="alert('Partner class connection coming in a future update!')">Connect</button>
        </div>
      </div>
      <div class="connect-section">
        <div class="section-title" style="margin-bottom:12px;">Manually match two students</div>
        <div style="font-size:13px;color:#888;margin-bottom:12px;">Pick two students to connect as pen pals.</div>
        <div class="input-row">
          <select class="connect-input" id="student-a">
            <option value="">— Student A —</option>
            ${students.map(s => `<option value="${s.id}">${s.display_name}</option>`).join('')}
          </select>
          <select class="connect-input" id="student-b">
            <option value="">— Student B —</option>
            ${students.map(s => `<option value="${s.id}">${s.display_name}</option>`).join('')}
          </select>
          <button class="connect-btn" onclick="matchStudents()">Match →</button>
        </div>
        <div id="match-msg" style="font-size:12px;margin-top:8px;"></div>
      </div>
    `
  }

  window.matchStudents = async function() {
    const a = document.getElementById('student-a').value
    const b = document.getElementById('student-b').value
    const msg = document.getElementById('match-msg')

    if (!a || !b) { msg.style.color='#A32D2D'; msg.textContent='Please select two students.'; return }
    if (a === b) { msg.style.color='#A32D2D'; msg.textContent='Please select two different students.'; return }

    const { error } = await supabase.from('pen_pal_connections').insert({
      student_a: a,
      student_b: b,
      connected_by: 'teacher',
      status: 'active'
    })

    if (error) { msg.style.color='#A32D2D'; msg.textContent='Error: '+error.message; return }
    msg.style.color='#0F6E56'
    msg.textContent='✓ Students matched! They can now write to each other.'
  }

  function renderSettings(panel) {
    panel.innerHTML = `
      <div class="page-title">⚙ Class settings</div>
      <div class="page-sub">Control what your students can do and what gets flagged.</div>
      <div class="card" style="padding:20px;">
        <div class="section-title" style="margin-bottom:16px;">Classroom controls</div>
        <div class="settings-row">
          <div class="sr-lbl"><p>Target language only</p><span>Students may only write in their learning language. English is hidden.</span></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
        <div class="settings-row">
          <div class="sr-lbl"><p>One letter per day</p><span>Students can send one letter per pen pal per day.</span></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
        <div class="settings-row">
          <div class="sr-lbl"><p>Grammar feedback</p><span>A brief AI note shown to the sender after each letter is reviewed.</span></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
        <div class="settings-row">
          <div class="sr-lbl"><p>Translation hints</p><span>Students can tap to reveal an English translation.</span></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
        <div class="settings-row">
          <div class="sr-lbl"><p>Photo sharing</p><span>Allow students to attach photos. You see all photos before delivery.</span></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
        <div class="section-title" style="margin:20px 0 16px;">Flag controls</div>
        <div class="settings-row">
          <div class="sr-lbl"><p>Personal contact information</p><span>Flag phone numbers, addresses, last names.</span></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
        <div class="settings-row">
          <div class="sr-lbl"><p>Off-platform suggestions</p><span>Flag attempts to move to Discord, Instagram etc.</span></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
        <div class="settings-row">
          <div class="sr-lbl"><p>Romantic content</p><span>Flag any romantic language directed at the pen pal.</span></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
        <div class="settings-row">
          <div class="sr-lbl"><p>Inappropriate language</p><span>Always on — cannot be disabled for school accounts.</span></div>
          <label class="tog"><input type="checkbox" checked disabled><span class="tsl"></span></label>
        </div>
        <div class="settings-row">
          <div class="sr-lbl"><p>Notify parents simultaneously</p><span>Parents receive flag notifications at the same time as you.</span></div>
          <label class="tog"><input type="checkbox" checked><span class="tsl"></span></label>
        </div>
      </div>
    `
  }

  function studentRow(s) {
    const initials = s.display_name?.split(' ').map(x => x[0]).join('').substring(0,2) || '??'
    return `<div class="student-row">
      <div class="av" style="width:32px;height:32px;background:#E1F5EE;color:#0F6E56;">${initials}</div>
      <div class="st-info">
        <div class="st-name">${s.display_name}</div>
        <div class="st-sub">${s.learning_language || 'Language learner'} · ${s.flag_count || 0} flags</div>
      </div>
      <span class="chip ${s.flag_count > 0 ? 'ca' : 'cg'}">${s.flag_count > 0 ? '⚠ ' + s.flag_count + ' flag' + (s.flag_count !== 1 ? 's' : '') : '✓ active'}</span>
    </div>`
  }

  function flagCard(f) {
    return `<div class="flag-card">
      <div class="flag-student">${f.student?.display_name || 'Student'} · ${new Date(f.created_at).toLocaleDateString()}</div>
      <div class="flag-reason">⚠ ${f.reason}</div>
      ${f.student_explanation
        ? `<div class="flag-explanation"><strong>Student's explanation:</strong> "${f.student_explanation}"</div>`
        : `<div class="flag-explanation" style="color:#aaa;font-style:italic;">No explanation provided yet.</div>`}
      <div style="font-size:10px;color:#aaa;margin-bottom:8px;">Letter is held — not delivered to pen pal.</div>
      <div class="flag-actions">
        <button class="fbtn fa" onclick="resolveFlag('${f.id}','waived')">✓ Waive — allow letter</button>
        <button class="fbtn fr" onclick="resolveFlag('${f.id}','upheld')">✗ Remove letter</button>
      </div>
    </div>`
  }

  window.resolveFlag = async function(flagId, outcome) {
    await supabase.from('flags').update({
      outcome,
      reviewed_by: currentUser.id,
      reviewed_at: new Date().toISOString()
    }).eq('id', flagId)

    flags = flags.filter(f => f.id !== flagId)
    document.getElementById('flag-count').textContent = flags.length
    renderView()
  }

  window.handleSignOut = async function() {
    await supabase.auth.signOut()
    window.location.href = '/login.html'
  }

  init()
</script>
</body>
</html>
