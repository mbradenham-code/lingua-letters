<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua Letters — Flagged Letters</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1EFE8; min-height: 100vh; }
    .topbar { background: white; border-bottom: 1px solid #e5e3dc; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 500; color: #1a1a1a; }
    .orb { width: 26px; height: 26px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .spacer { flex: 1; }
    .back { font-size: 13px; color: #1D9E75; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .content { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .page-header { background: white; border-radius: 14px; padding: 24px 28px; margin-bottom: 20px; border: 1px solid #e5e3dc; }
    .page-header h1 { font-size: 20px; font-weight: 500; }
    .page-header p { font-size: 13px; color: #888; margin-top: 4px; }
    .flag-card { background: white; border-radius: 14px; border: 1px solid #e5e3dc; margin-bottom: 16px; overflow: hidden; }
    .flag-header { padding: 16px 20px; border-bottom: 1px solid #f0ede6; display: flex; align-items: center; justify-content: space-between; }
    .flag-meta { font-size: 12px; color: #aaa; }
    .flag-reason { display: inline-flex; font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #FAEEDA; color: #854F0B; margin-left: 8px; }
    .flag-body { padding: 20px; }
    .letter-text { font-size: 14px; color: #333; line-height: 1.7; background: #F8F7F4; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .explanation-box { background: #E1F5EE; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
    .explanation-label { font-size: 11px; color: #0F6E56; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; font-weight: 500; }
    .explanation-text { font-size: 13px; color: #1a1a1a; line-height: 1.6; }
    .actions { display: flex; gap: 10px; }
    .btn { padding: 9px 18px; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
    .btn-approve { background: #1D9E75; color: white; }
    .btn-approve:hover { background: #0F6E56; }
    .btn-decline { background: #FCEBEB; color: #A32D2D; }
    .btn-decline:hover { background: #f5d5d5; }
    .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
    .loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
    .success-msg { font-size: 12px; color: #1D9E75; margin-top: 10px; display: none; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="orb">✉</div>Lingua Letters</div>
  <div class="spacer"></div>
  <a class="back" href="/dashboard.html">← Dashboard</a>
</div>
<div class="content">
  <div class="page-header">
    <h1>🚩 Flagged Letters</h1>
    <p>Letters held for review by the AI moderation system. Approve to deliver or decline to block.</p>
  </div>
  <div id="loading" class="loading">Loading flagged letters…</div>
  <div id="flag-list"></div>
</div>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://vfohvovtxklsdvpigycx.supabase.co',
    'sb_publishable_iOcoEodjREKpEL1B7DqRSg_k4cKFSEu'
  )

  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.href = '/login.html' }

  const { data: me } = await supabase.from('users').select('*').eq('id', session.user.id).single()
  if (!me || me.account_type !== 'teacher') { window.location.href = '/dashboard.html' }

  // Get students in this teacher's class
  const { data: myStudents } = await supabase
    .from('users')
    .select('id')
    .eq('teacher_id', me.id)

  const studentIds = (myStudents || []).map(s => s.id)

  document.getElementById('loading').style.display = 'none'
  const list = document.getElementById('flag-list')

  if (studentIds.length === 0) {
    list.innerHTML = '<div class="empty">No students in your class yet.</div>'
    return
  }

  const { data: flags } = await supabase
    .from('flags')
    .select('*, student:users!flags_student_id_fkey(display_name), letter:letters(body, sender_id, recipient_id)')
    .in('student_id', studentIds)
    .eq('outcome', 'pending')
    .order('created_at', { ascending: false })

  if (!flags || flags.length === 0) {
    list.innerHTML = '<div class="empty">✅ No flagged letters to review. All clear!</div>'
    return
  }

  list.innerHTML = flags.map(f => `
    <div class="flag-card" id="flag-${f.id}">
      <div class="flag-header">
        <div>
          <strong style="font-size:14px;">${f.student?.display_name || 'Unknown student'}</strong>
          <span class="flag-reason">${f.reason || 'Flagged by AI'}</span>
        </div>
        <div class="flag-meta">${new Date(f.created_at).toLocaleDateString()}</div>
      </div>
      <div class="flag-body">
        <div class="letter-text">${f.letter?.body || 'Letter content unavailable.'}</div>
        ${f.student_explanation ? `
          <div class="explanation-box">
            <div class="explanation-label">Student's explanation</div>
            <div class="explanation-text">${f.student_explanation}</div>
          </div>` : ''}
        <div class="actions">
          <button class="btn btn-approve" onclick="resolve('${f.id}', 'approved')">✓ Approve & deliver</button>
          <button class="btn btn-decline" onclick="resolve('${f.id}', 'declined')">✕ Decline & block</button>
        </div>
        <div class="success-msg" id="msg-${f.id}"></div>
      </div>
    </div>
  `).join('')

  window.resolve = async function(flagId, outcome) {
    const { error } = await supabase
      .from('flags')
      .update({ outcome })
      .eq('id', flagId)

    const msg = document.getElementById('msg-' + flagId)
    if (error) {
      msg.textContent = 'Something went wrong. Please try again.'
      msg.style.color = '#A32D2D'
    } else {
      msg.textContent = outcome === 'approved' ? '✓ Letter approved and delivered.' : '✕ Letter blocked.'
      document.querySelector(`#flag-${flagId} .actions`).style.display = 'none'
    }
    msg.style.display = 'block'
  }
</script>
</body>
</html>
